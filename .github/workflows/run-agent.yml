name: Daily YouTube Tech Agent

on:
  schedule:
    - cron: '30 13 * * *' # 7:00 PM IST
  workflow_dispatch: 

jobs:
  build_video:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Tools
      run: |
        pip install requests google-genai edge-tts moviepy
        sudo apt-get install ffmpeg

    - name: Run AI Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      run: python agent.py
