name: Daily YouTube Tech Agent

on:
  schedule:
    - cron: '0 9 * * *' # Runs every day at 9:00 AM UTC
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  build_video:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        pip install requests google-generativeai edge-tts moviepy
        sudo apt-get install ffmpeg

    - name: Run AI Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      run: python agent.py
